[entity-description]
# Small biter pet description
pet-small-biter-baby=A small and fragile biter companion.
pet-small-biter-small=A small biter companion with growing strength.
pet-small-biter-large=A maturing small biter companion.

pet-small-biter-baby-sleeping=The tiny biter is sleeping peacefully.
pet-small-biter-small-sleeping=Your small biter is peacefully resting.
pet-small-biter-large-sleeping=A small biter dreaming of biter things.

pet-small-biter-baby-idle=A very small biter baby not doing much.
pet-small-biter-small-idle=An idle, adolsecent biter.
pet-small-biter-large-idle=A growing biter just taking in its surroundings.

# Medium biter pet description
pet-medium-biter-baby=A stout medium biter companion.
pet-medium-biter-small=A stalwart medium biter companion.
pet-medium-biter-large=A dependable medium biter companion.

pet-medium-biter-baby-sleeping=The little guy is all tuckered out.
pet-medium-biter-small-sleeping=A long rest after a long day.
pet-medium-biter-large-sleeping=A spunky biter taking a well deserved nap.

pet-medium-biter-baby-idle=This biter seems happy to do nothing.
pet-medium-biter-small-idle=It seems content to wander.
pet-medium-biter-large-idle=It looks like it is living the dream.

# Big biter pet description
pet-big-biter-baby=A staunch big biter companion.
pet-big-biter-small=A faithful and courageous friend.
pet-big-biter-large=A tenacious big biter companion.

pet-big-biter-baby-sleeping=This growing big biter is tired but alert.
pet-big-biter-small-sleeping=The big biter is probably dreaming of fish.
pet-big-biter-large-sleeping=I guess even the tireless get tired.

pet-big-biter-baby-idle=A large biter taking in the sights. 
pet-big-biter-small-idle=I wonder if he misses his biter parents?
pet-big-biter-large-idle=It seems idle but ready to go.

# Behemoth biter pet description
pet-behemoth-biter-baby=A behemoth of a baby.
pet-behemoth-biter-small=A growing behemoth biter.
pet-behemoth-biter-large=They grow up so fast.

pet-behemoth-biter-baby-sleeping=My faithful friend is taking a nap.
pet-behemoth-biter-small-sleeping=I hope his dreams are pleasant.
pet-behemoth-biter-large-sleeping=I think his snoring is damaging the assemblers.

pet-behemoth-biter-baby-idle=It looks like a walking tank.
pet-behemoth-biter-small-idle=It seems very strong despite never exercising.
pet-behemoth-biter-large-idle=An absolute unit of an idling biter.

# Spitter pet description
pet-small-spitter-baby=A tiny spitter baby.
pet-small-spitter-small=A small spitter companion.
pet-small-spitter-large=A maturing spitter with big dreams.

pet-small-spitter-baby-sleeping=All curled up like a roly-poly.
pet-small-spitter-small-sleeping=A small spitter recharging its... spit?
pet-small-spitter-large-sleeping=A spitter drooling in its sleep. It might damage the concrete.

pet-small-spitter-baby-idle=A tiny spitter practicing its spitting.
pet-small-spitter-small-idle=It is just standing there, occasionally gurgling.
pet-small-spitter-large-idle=A mature spitter watching the clouds, or maybe the pollution.

# Medium spitter pet description
pet-medium-spitter-baby=A pudgy little spitter still figuring out how its mouth works.
pet-medium-spitter-small=A growing spitter companion with a messy splash radius.
pet-medium-spitter-large=It gurgles with surprising authority.

pet-medium-spitter-baby-sleeping=The spitter snores like a faulty offshore pump.
pet-medium-spitter-small-sleeping=All curled up like a warm, acidtic pretzel.
pet-medium-spitter-large-sleeping=A plump spitter dreaming of long-range trajectories.

pet-medium-spitter-baby-idle=This medium spitter seems to be day-dreaming.
pet-medium-spitter-small-idle=It is swaying slightly, enjoying the hum of the assemblers.
pet-medium-spitter-large-idle=Standing short and looking surprisingly dignified.

# Big spitter pet description
pet-big-spitter-baby=A hefty young spitter with more enthusiasm than aim.
pet-big-spitter-small=A sturdy spitter companion who seems proud of every gurgle.
pet-big-spitter-large=A formidable spitter whose presence alone discourages pests and engineers alike.

pet-big-spitter-baby-sleeping=A big spitter snoring faintly, producing tiny acidic bubbles.
pet-big-spitter-small-sleeping=A big spitter slumbering like it owns the entire chunk.
pet-big-spitter-large-sleeping=It radiates warm, gooey contentment.

pet-big-spitter-baby-idle=A growing spitter looking for trouble.
pet-big-spitter-small-idle=It seems to be contemplating the local flora.
pet-big-spitter-large-idle=A maturing spitter taking a moment to catch its breath.

# Behemoth spitter pet description
pet-behemoth-spitter-baby=A spitter of truly unreasonable proportions.
pet-behemoth-spitter-small=A growing behemoth spitter whose breath can wilt trees.
pet-behemoth-spitter-large=Pure, distilled, chemical warfare.

pet-behemoth-spitter-baby-sleeping=I wonder if I can use its drool to make processing units?
pet-behemoth-spitter-small-sleeping=The gurgling sound is rattling the transport belts.
pet-behemoth-spitter-large-sleeping=The ground seems relieved whenever it exhales.

pet-behemoth-spitter-baby-idle=That is one huge lumbering vat of acid.
pet-behemoth-spitter-small-idle=It is just chilling, but it takes up a lot of space.
pet-behemoth-spitter-large-idle=An enormous spitter observing its domain with calm authority.